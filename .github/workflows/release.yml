name: Release

on:
  push:
    tags:
      - "v*.*.*"   # ex: v0.1.0, v1.2.3

permissions:
  contents: write

env:
  APP: virtusb
  GO_VERSION: "1.22"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Compute version
        shell: bash
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          echo "COMMIT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Build Linux AMD64
        shell: bash
        run: |
          LDFLAGS="-s -w -X main.version=${{ env.VERSION }} -X main.commit=${{ env.COMMIT }} -X main.date=${{ env.DATE }}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags "$LDFLAGS" -o dist/${{ env.APP }}_linux_amd64 ./cmd/${{ env.APP }}

      - name: Build Linux ARM64
        shell: bash
        run: |
          LDFLAGS="-s -w -X main.version=${{ env.VERSION }} -X main.commit=${{ env.COMMIT }} -X main.date=${{ env.DATE }}"
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -trimpath -ldflags "$LDFLAGS" -o dist/${{ env.APP }}_linux_arm64 ./cmd/${{ env.APP }}

      - name: Build macOS AMD64
        shell: bash
        run: |
          LDFLAGS="-s -w -X main.version=${{ env.VERSION }} -X main.commit=${{ env.COMMIT }} -X main.date=${{ env.DATE }}"
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 \
            go build -trimpath -ldflags "$LDFLAGS" -o dist/${{ env.APP }}_darwin_amd64 ./cmd/${{ env.APP }}

      - name: Build macOS ARM64
        shell: bash
        run: |
          LDFLAGS="-s -w -X main.version=${{ env.VERSION }} -X main.commit=${{ env.COMMIT }} -X main.date=${{ env.DATE }}"
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 \
            go build -trimpath -ldflags "$LDFLAGS" -o dist/${{ env.APP }}_darwin_arm64 ./cmd/${{ env.APP }}

      - name: Create install script
        shell: bash
        run: |
          cat > dist/install.sh << 'EOF'
          #!/bin/bash
          set -e
          
          # Detect OS and architecture
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)
          
          if [ "$ARCH" = "x86_64" ]; then
              ARCH="amd64"
          elif [ "$ARCH" = "aarch64" ]; then
              ARCH="arm64"
          fi
          
          BINARY="virtusb_${OS}_${ARCH}"
          URL="https://github.com/${{ github.repository }}/releases/latest/download/${BINARY}"
          
          echo "Downloading virtusb for ${OS}/${ARCH}..."
          curl -L -o virtusb "$URL"
          chmod +x virtusb
          
          echo "Installing to /usr/local/bin/virtusb..."
          sudo mv virtusb /usr/local/bin/
          
          echo "✅ virtusb installed successfully!"
          virtusb --version
          EOF
          
          chmod +x dist/install.sh

      - name: Create README for release
        shell: bash
        run: |
          cat > dist/README.md << EOF
          # virtusb v${{ env.VERSION }}
          
          ## Quick Install
          
          \`\`\`bash
          curl -sSL https://github.com/${{ github.repository }}/releases/latest/download/install.sh | bash
          \`\`\`
          
          ## Manual Install
          
          Download the appropriate binary for your system:
          
          - **Linux AMD64**: [virtusb_linux_amd64](virtusb_linux_amd64)
          - **Linux ARM64**: [virtusb_linux_arm64](virtusb_linux_arm64)
          - **macOS AMD64**: [virtusb_darwin_amd64](virtusb_darwin_amd64)
          - **macOS ARM64**: [virtusb_darwin_arm64](virtusb_darwin_arm64)
          
          Then:
          \`\`\`bash
          chmod +x virtusb_*
          sudo mv virtusb_* /usr/local/bin/virtusb
          \`\`\`
          
          ## Usage
          
          \`\`\`bash
          # Create a virtual USB key
          sudo virtusb create my_key --size 8G --brand sandisk
          
          # List gadgets
          sudo virtusb list
          
          # Get help
          virtusb help
          \`\`\`
          
          ## Changelog
          
          See the [full changelog](https://github.com/${{ github.repository }}/releases) for details.
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/virtusb_linux_amd64
            dist/virtusb_linux_arm64
            dist/virtusb_darwin_amd64
            dist/virtusb_darwin_arm64
            dist/install.sh
            dist/README.md
          body_path: dist/README.md
          draft: false
          prerelease: false
